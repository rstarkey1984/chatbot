server:
  port: 8888

spring:
  datasource:
    url: jdbc:mysql://localhost:3308/chatbot?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: chatbot_app
    password: ${CHATBOT_DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

app:
  auth:
    token-secret: ${CHATBOT_TOKEN_SECRET:}
    issue-api-key: ${CHATBOT_ISSUE_API_KEY:}
    default-issue-ttl-seconds: ${CHATBOT_DEFAULT_ISSUE_TTL_SECONDS:31536000}
    max-issue-ttl-seconds: ${CHATBOT_MAX_ISSUE_TTL_SECONDS:31536000}
  rate-limit:
    enabled: ${CHATBOT_RATE_LIMIT_ENABLED:true}
    requests-per-minute: ${CHATBOT_RATE_LIMIT_RPM:30}
  gateway:
    url: ${OPENCLAW_GATEWAY_URL:http://127.0.0.1:18789}
    token: ${OPENCLAW_GATEWAY_TOKEN:}
    config-path: ${OPENCLAW_CONFIG_PATH:~/.openclaw/openclaw.json}
    agent-id: ${OPENCLAW_AGENT_ID:chatbot}    
    session-key-prefix: ${OPENCLAW_SESSION_KEY_PREFIX:agent:chatbot:tutor:session:}
    default-session: ${CHATBOT_DEFAULT_SESSION:dev}
